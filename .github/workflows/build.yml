name: build

on:
  workflow_dispatch:

jobs:
  build:
    name: build-${{ matrix.os }}-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: sfbot.exe
            artifact: sfbot-windows-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: sfbot
            artifact: sfbot-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: sfbot
            artifact: sfbot-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sfBot/src-tauri -> target

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: sfBot/src-tauri

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: sfBot/src-tauri/target/${{ matrix.target }}/release/${{ matrix.bin }}
          if-no-files-found: error

  linux-arm:
    name: build-linux-${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
          - i686-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross)
        run: cross build --release --target ${{ matrix.target }}
        working-directory: sfBot/src-tauri

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sfbot-linux-${{ matrix.target }}
          path: sfBot/src-tauri/target/${{ matrix.target }}/release/sfbot
          if-no-files-found: error
